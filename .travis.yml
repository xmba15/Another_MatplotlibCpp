language:
  - cpp

dist: xenial

sudo: false

compiler:
  - gcc

addons:
  apt:
    sources:
      - ubuntu-toolchain-r-test
    packages:
      - cmake
      - g++-6

env:
  - MATRIX_EVAL="CC=gcc-6 && CXX=g++-6"

before_install:
  - readonly PARENT_DIR=$(pwd)
  - eval "${MATRIX_EVAL}"

script:
  - cd ${PARENT_DIR}
  - git submodule update --init --recursive
  - mkdir build
  - cd build
  - cmake -DBUILD_EXAMPLES=ON ../
  - cmake --build .

notifications:
  email: false
